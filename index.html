<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODM Tournament Registration</title>
  
  <!-- Paystack Inline SDK -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #333;
      background: #2b2b2b;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #00c853;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background-color: #00e676;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>CODM Match Entry</h2>
    <p>Entry Fee: <strong>₦1,000</strong></p>

    <!-- Player Inputs -->
    <input type="text" id="gamerTag" placeholder="CODM Gamer Tag / Name" required />
    <input type="email" id="email-address" placeholder="Email Address" required />

    <!-- Pay Button -->
    <button type="button" onclick="payWithPaystack()">Pay ₦1,000 to Register</button>
  </div>

  <script>
    function payWithPaystack() {
      const email = document.getElementById("email-address").value;
      const gamerTag = document.getElementById("gamerTag").value;

      if (!email || !gamerTag) {
        alert("Please enter both your Gamer Tag and Email Address.");
        return;
      }

      let handler = PaystackPop.setup({
        key: 'pk_test_5a8bd4dcc8f233f4b69be0bf0acf330258189a36',
        email: email,
        amount: 100000,
        currency: 'NGN',
        ref: 'CODM_' + Math.floor((Math.random() * 1000000000) + 1),
        metadata: {
          custom_fields: [
            {
              display_name: "Gamer Tag",
              variable_name: "gamer_tag",
              value: gamerTag
            }
          ]
        },
        onClose: function() {
          alert('Transaction cancelled.');
        },
        callback: function(response) {
          alert('Payment Successful! Reference: ' + response.reference);
        }
      });

      handler.openIframe();
    }
  </script>

</body>
</html>
