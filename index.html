<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODM Tournament Registration</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Paystack Inline Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <!-- Firebase App & Realtime Database SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 flex flex-col items-center justify-center">

  <div class="max-w-md w-full bg-gray-800 rounded-lg p-6 shadow-lg border border-gray-700">
    <h1 class="text-2xl font-bold text-center mb-6 text-yellow-400">CODM Match Registration</h1>

    <!-- REGISTRATION FORM SECTION -->
    <div id="match-form">
      <!-- Match Mode Selection -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Select Match Mode</label>
        <div class="grid grid-cols-2 gap-2">
          <button type="button" onclick="selectMode('1v1 Sniper', 500)" class="bg-gray-700 hover:bg-yellow-500 hover:text-black py-2 px-4 rounded font-semibold transition">1v1 Sniper (₦500)</button>
          <button type="button" onclick="selectMode('BR Solo', 1000)" class="bg-gray-700 hover:bg-yellow-500 hover:text-black py-2 px-4 rounded font-semibold transition">BR Solo (₦1,000)</button>
        </div>
      </div>

      <!-- Player Inputs -->
      <form onsubmit="handlePayment(event)">
        <div class="mb-3">
          <label class="block text-xs mb-1">In-Game Name (IGN)</label>
          <input type="text" id="ign" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
        </div>

        <div class="mb-3">
          <label class="block text-xs mb-1">CODM UID</label>
          <input type="text" id="uid" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
        </div>

        <div class="mb-3">
          <label class="block text-xs mb-1">Email Address</label>
          <input type="email" id="email" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
        </div>

        <div class="mb-3">
          <label class="block text-xs mb-1">Payout Bank Name</label>
          <input type="text" id="bank-name" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
        </div>

        <div class="mb-3">
          <label class="block text-xs mb-1">Account Number</label>
          <input type="text" id="account-number" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
        </div>

        <div class="mb-4">
          <label class="block text-xs mb-1">Account Name</label>
          <input type="text" id="account-name" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-yellow-400">
        </div>

        <!-- Pay Button -->
        <button id="pay-btn" type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded transition">
          Select a Match Mode First
        </button>
      </form>
    </div>

    <!-- WAITING ROOM SECTION (HIDDEN BY DEFAULT) -->
    <div id="waiting-room" style="display: none;" class="text-center">
      <div class="bg-green-900/40 border border-green-500 rounded-lg p-4 mb-4">
        <h2 class="text-xl font-bold text-green-400 mb-1">Registration Successful!</h2>
        <p class="text-sm text-gray-300">You are now in the waiting room.</p>
      </div>

      <div class="bg-gray-900 p-4 rounded text-left space-y-2 mb-4 text-sm">
        <p><span class="text-gray-400">Match Mode:</span> <strong id="display-mode" class="text-white"></strong></p>
        <p><span class="text-gray-400">IGN:</span> <strong id="display-ign" class="text-white"></strong></p>
        <p><span class="text-gray-400">Reference:</span> <strong id="display-payout" class="text-yellow-400"></strong></p>
      </div>

      <p class="text-xs text-gray-400 animate-pulse">Waiting for the match room details to launch...</p>
    </div>

  </div>

  <script>
    // ----------------------------------------------------
    // 1. FIREBASE CONFIGURATION
    // (Replace these credentials with your Firebase details)
    // ----------------------------------------------------
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    // State Variables
    let selectedMatchMode = "";
    let currentFee = 0;

    // Function to handle Mode Selection
    function selectMode(modeName, fee) {
      selectedMatchMode = modeName;
      currentFee = fee;
      const payBtn = document.getElementById('pay-btn');
      if (payBtn) {
        payBtn.innerText = `Pay ₦${fee.toLocaleString()} & Join ${modeName}`;
      }
    }

    // Main Function to Execute Payment & Firebase Save
    function handlePayment(e) {
      // Prevent browser default form reload
      if (e && e.preventDefault) e.preventDefault();

      // Get Form Field Values
      const ign = document.getElementById('ign') ? document.getElementById('ign').value.trim() : '';
      const uid = document.getElementById('uid') ? document.getElementById('uid').value.trim() : '';
      const email = document.getElementById('email') ? document.getElementById('email').value.trim() : '';
      const bank = document.getElementById('bank-name') ? document.getElementById('bank-name').value.trim() : '';
      const accNum = document.getElementById('account-number') ? document.getElementById('account-number').value.trim() : '';
      const accName = document.getElementById('account-name') ? document.getElementById('account-name').value.trim() : '';

      if (!currentFee || currentFee <= 0) {
        alert("Please select a match mode first!");
        return;
      }

      // Initialize Paystack Pop Up
      let handler = PaystackPop.setup({
        key: 'pk_test_5a8bd4dcc8f233f4b65be0bf0acf330258189a36', // Your Paystack Key
        email: email,
        amount: currentFee * 100, // Converts to Kobo
        currency: "NGN",
        ref: 'CODM_' + Math.floor((Math.random() * 1000000000) + 1),
        metadata: {
          custom_fields: [
            { display_name: "Match Mode", variable_name: "match_mode", value: selectedMatchMode },
            { display_name: "IGN", variable_name: "ign", value: ign },
            { display_name: "CODM UID", variable_name: "codm_uid", value: uid },
            { display_name: "Payout Bank", variable_name: "payout_bank", value: bank },
            { display_name: "Account Number", variable_name: "account_number", value: accNum },
            { display_name: "Account Name", variable_name: "account_name", value: accName }
          ]
        },
        callback: function(response) {
          // Push data to Firebase Database
          const database = firebase.database();
          
          database.ref('registrations/' + response.reference).set({
            reference: response.reference,
            ign: ign,
            uid: uid,
            email: email,
            matchMode: selectedMatchMode,
            feePaid: currentFee,
            payoutBank: bank,
            accountNumber: accNum,
            accountName: accName,
            status: "Paid",
            timestamp: new Date().toISOString()
          }, function(error) {
            if (error) {
              alert("Database save failed: " + error.message);
            } else {
              // Hide Registration Form and Show Waiting Room
              document.getElementById('match-form').style.display = 'none';
              document.getElementById('waiting-room').style.display = 'block';

              // Display Registration Details in Waiting Room
              if (document.getElementById('display-mode')) {
                document.getElementById('display-mode').innerText = selectedMatchMode;
              }
              if (document.getElementById('display-ign')) {
                document.getElementById('display-ign').innerText = ign;
              }
              if (document.getElementById('display-payout')) {
                document.getElementById('display-payout').innerText = response.reference;
              }
            }
          });
        },
        onClose: function() {
          alert('Transaction was cancelled.');
        }
      });

      handler.openIframe();
    }
  </script>
</body>
</html>
